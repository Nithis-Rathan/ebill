<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Receipt</title>

    <!-- Tailwind CSS for styling the background/buttons -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Pako library for fast browser-based decompression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <!-- html2canvas for Image Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- html2pdf for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
            padding-bottom: 2rem;
        }

        /* Container to center the paper on screen with a nice shadow */
        .receipt-wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem auto;
        }

        /* ==============================================================
           EXACT POS TERMINAL RECEIPT CSS (Extracted from INV-*.html)
           ============================================================== */
        .receipt-paper {
            background: #fff;
            width: 100%;
            max-width: 80mm; /* Standard thermal printer width */
            margin: 0 auto;
            padding: 5mm;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.45;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .receipt-paper .text-center { text-align: center; }
        .receipt-paper .text-right { text-align: right; }
        .receipt-paper .font-bold { font-weight: bold; font-size: 13px; }
        
        .receipt-paper .title-text { 
            font-weight: bold; 
            font-size: 15px; 
            text-align: center; 
            line-height: 1.3; 
            margin-bottom: 2px; 
        }
        
        .receipt-paper .divider { 
            border: none; 
            border-top: 1px dashed #000; 
            margin: 4px 0; 
        }
        
        .receipt-paper table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; 
        }
        
        .receipt-paper th, .receipt-paper td { 
            padding: 2px 1px; 
            vertical-align: top; 
            word-break: break-word; 
            overflow-wrap: break-word; 
        }
        
        .receipt-paper th { 
            text-align: left; 
            border-bottom: 1px dashed #000; 
        }
        
        .receipt-paper .col-item { width: auto; }
        .receipt-paper .col-qty { width: 34px; text-align: center; white-space: nowrap; }
        .receipt-paper .col-price { width: 85px; text-align: right; white-space: nowrap; }
        
        .receipt-paper .summary-table td:first-child { width: auto; }
        .receipt-paper .summary-table td:last-child { width: 85px; text-align: right; white-space: nowrap; }
        
        .receipt-paper .header-info { font-size: 12px; }
        .receipt-paper .mt-2 { margin-top: 6px; }

        /* ==============================================================
           PRINT ENGINE OVERRIDES 
           ============================================================== */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .hide-on-print {
                display: none !important;
            }
            .receipt-wrapper {
                max-width: 100%;
                margin: 0;
            }
            .receipt-paper {
                box-shadow: none;
                width: 80mm !important; /* Force exact physical width for thermal printers */
                max-width: 80mm !important;
                padding: 0;
                margin: 0;
            }
            @page {
                size: 80mm auto;
                margin: 0;
            }
        }
        
        /* Fallback styling for loading state or errors */
        .fallback-box {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            text-align: center;
            font-family: sans-serif;
        }

        /* Prevent button text selection */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <!-- Toast Notification (Micro-action feedback) -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 -translate-y-10 z-50 pointer-events-none flex items-center gap-2 font-sans text-sm hide-on-print">
        <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toast-message">Action successful!</span>
    </div>

    <!-- Receipt Container -->
    <div class="receipt-wrapper" id="pdf-target">
        <div id="receipt-container">
            <div class="fallback-box text-gray-500">
                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Loading receipt data...
            </div>
        </div>
    </div>

    <!-- Ad Slot Placeholder -->
    <div id="ad-slot" class="w-full max-w-sm bg-gray-200 border border-gray-300 rounded-lg flex items-center justify-center p-4 mb-6 hide-on-print text-gray-500 text-sm font-sans text-center h-20 shadow-inner">
        <!-- Insert your AdSense or Ad Network snippet here -->
        <span>Advertisement Slot</span>
    </div>

    <!-- Static Action Buttons (Bottom of the page) -->
    <div class="flex flex-row gap-3 justify-center hide-on-print w-full max-w-sm font-sans mb-6 no-select">
        <!-- Download Image Button -->
        <button onclick="downloadAsImage()" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-white text-gray-800 rounded-xl shadow-md hover:bg-gray-50 border border-gray-200 transition-transform active:scale-95 cursor-pointer font-semibold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Save Image
        </button>

        <!-- Download PDF Button -->
        <button onclick="downloadAsPDF()" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-gray-800 text-white rounded-xl shadow-md hover:bg-black transition-transform active:scale-95 cursor-pointer font-semibold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Save PDF
        </button>
    </div>

    <!-- Powered By Footer -->
    <div class="text-center font-sans text-xs text-gray-500 hide-on-print mb-8">
        Powered by <a href="https://southeastocean.com/" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:text-blue-700 hover:underline transition-colors">southeastocean</a>
    </div>

    <!-- Floating Action Button (Share Only) -->
    <div class="fixed bottom-6 right-6 z-40 hide-on-print font-sans no-select">
        <button onclick="shareReceipt()" class="w-14 h-14 bg-black text-white rounded-full shadow-2xl flex items-center justify-center hover:bg-gray-800 transition-transform hover:scale-105 active:scale-90 cursor-pointer">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
            </svg>
        </button>
    </div>

    <script>
        // ==========================================
        // MICRO-ACTIONS & BUTTON LOGIC
        // ==========================================

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('opacity-0', '-translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-10', 'pointer-events-none');
            }, 3000);
        }

        function shareReceipt() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: 'Digital Receipt',
                    text: 'Here is your receipt.',
                    url: url
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    showToast("Link copied to clipboard!");
                }).catch(err => {
                    showToast("Failed to copy link.");
                });
            }
        }

        function downloadAsImage() {
            showToast("Generating image...");
            
            const receiptElement = document.querySelector('.receipt-paper');
            if(!receiptElement) return;

            const originalShadow = receiptElement.style.boxShadow;
            receiptElement.style.boxShadow = 'none';

            // Ensure we capture the full scrollable height to avoid clipping
            const elementHeight = receiptElement.scrollHeight;

            html2canvas(receiptElement, {
                scale: 2,
                backgroundColor: '#ffffff',
                useCORS: true,
                scrollY: 0,
                windowHeight: elementHeight
            }).then(canvas => {
                receiptElement.style.boxShadow = originalShadow;
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `Receipt_${new Date().getTime()}.png`;
                link.href = image;
                link.click();
                showToast("Image downloaded!");
            }).catch(err => {
                console.error(err);
                receiptElement.style.boxShadow = originalShadow;
                showToast("Error saving image.");
            });
        }

        function downloadAsPDF() {
            showToast("Generating PDF...");

            const element = document.querySelector('.receipt-paper');
            if(!element) return;

            const originalShadow = element.style.boxShadow;
            element.style.boxShadow = 'none';

            // Get exact full unclipped height
            const elementHeight = element.scrollHeight;
            
            // Convert px to mm (1px = ~0.264583mm) and add an extra 15mm padding to guarantee no cutoff
            const pdfHeightMm = (elementHeight * 0.264583) + 15;

            const opt = {
                margin:       0,
                filename:     `Receipt_${new Date().getTime()}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 2,
                    useCORS: true,
                    scrollY: 0,
                    windowHeight: elementHeight
                },
                jsPDF:        { unit: 'mm', format: [80, pdfHeightMm], orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.boxShadow = originalShadow;
                showToast("PDF downloaded!");
            }).catch(err => {
                console.error(err);
                element.style.boxShadow = originalShadow;
                showToast("Error saving PDF.");
            });
        }

        // ==========================================
        // RECEIPT DECOMPRESSION & RENDERING LOGIC
        // ==========================================

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const cdata = params.get('cdata'); 
            const data = params.get('data');   
            
            const container = document.getElementById('receipt-container');

            try {
                let decompressedText = "";
                
                if (cdata) {
                    let base64 = cdata.replace(/-/g, '+').replace(/_/g, '/');
                    while (base64.length % 4) { base64 += '='; }
                    const binaryStr = atob(base64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    decompressedText = pako.inflateRaw(bytes, { to: 'string' });
                } else if (data) {
                    decompressedText = decodeURIComponent(data);
                } else {
                    throw new Error("No data");
                }

                if (decompressedText.includes('Inv:') || decompressedText.includes('a:') || decompressedText.includes('Sub:') || decompressedText.includes('f:')) {
                    renderStyledReceipt(decompressedText, container);
                } else {
                    container.innerHTML = `<pre class="whitespace-pre-wrap text-sm leading-relaxed text-gray-800 bg-white p-6 rounded shadow">${decompressedText}</pre>`;
                }

            } catch (error) {
                console.error("Decoding error:", error);
                container.innerHTML = `
                    <div class="fallback-box">
                        <svg class="w-12 h-12 text-red-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <h3 class="text-lg font-bold text-gray-800 mb-1">Invalid Receipt</h3>
                        <p class="text-gray-500 text-sm">The QR code link might be broken or incomplete.</p>
                    </div>
                `;
            }
        });

        function formatMoney(val) {
            if (!val) return val;
            let numStr = val.toString().replace(/,/g, '').replace(/₹/g, '').trim();
            
            let isNegative = numStr.startsWith('-');
            if (isNegative) numStr = numStr.substring(1);
            let isPositive = numStr.startsWith('+');
            if (isPositive) numStr = numStr.substring(1);

            if (!isNaN(numStr) && numStr !== '') {
                let formatted = parseFloat(numStr).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                return (isNegative ? '-' : (isPositive ? '+' : '')) + formatted;
            }
            return val;
        }

        function renderStyledReceipt(text, container) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
            
            let headers = [];
            let meta = [];
            let items = [];
            let summary = { subtotal: '', grandTotal: '' };
            let adjustments = [];

            let state = 'header'; 
            let flatItems = []; 
            
            let i = 0;
            while (i < lines.length) {
                let line = lines[i];

                function getValue(prefix) {
                    let val = line.substring(prefix.length).trim();
                    if (!val && i + 1 < lines.length) {
                        let nextLine = lines[i+1].trim();
                        if (!nextLine.includes(':') || nextLine.match(/^\d{2}-\d{2}-\d{4}/)) {
                            val = nextLine;
                            i++; 
                        }
                    }
                    return val;
                }

                if (line.startsWith('Sub:') || line.startsWith('f:') || line.startsWith('Subtotal:')) {
                    let prefix = line.startsWith('Subtotal:') ? 'Subtotal:' : (line.startsWith('Sub:') ? 'Sub:' : 'f:');
                    summary.subtotal = formatMoney(getValue(prefix));
                    state = 'summary';
                    i++; continue;
                }

                if (state === 'summary') {
                    if (line.startsWith('Tot:') || line.startsWith('g:') || line.startsWith('Grand Total:')) { 
                        let prefix = line.startsWith('Grand Total:') ? 'Grand Total:' : (line.startsWith('Tot:') ? 'Tot:' : 'g:');
                        summary.grandTotal = formatMoney(getValue(prefix)); 
                        i++; continue; 
                    }
                    if (line.startsWith('Paid:') || line.startsWith('h:') || line.startsWith('Advance Paid:')) { 
                        let prefix = line.startsWith('Advance Paid:') ? 'Advance Paid:' : (line.startsWith('Paid:') ? 'Paid:' : 'h:');
                        summary.advance = formatMoney(getValue(prefix)); 
                        i++; continue; 
                    }
                    if (line.startsWith('Due:') || line.startsWith('i:') || line.startsWith('Balance Due:')) { 
                        let prefix = line.startsWith('Balance Due:') ? 'Balance Due:' : (line.startsWith('Due:') ? 'Due:' : 'i:');
                        summary.balance = formatMoney(getValue(prefix)); 
                        i++; continue; 
                    }
                    if (line.startsWith('DueDt:') || line.startsWith('j:') || line.startsWith('Due Date:')) { 
                        let prefix = line.startsWith('Due Date:') ? 'Due Date:' : (line.startsWith('DueDt:') ? 'DueDt:' : 'j:');
                        summary.dueDate = getValue(prefix); 
                        i++; continue; 
                    }
                    if (line.startsWith('Rounding:') || line.startsWith('m:')) { 
                        let prefix = line.startsWith('Rounding:') ? 'Rounding:' : 'm:';
                        adjustments.push({ label: 'Rounding:', val: formatMoney(getValue(prefix)) }); 
                        i++; continue; 
                    }
                    
                    if (line.includes(':')) {
                        let lastColonIdx = line.lastIndexOf(':');
                        let labelStr = line.substring(0, lastColonIdx).trim();
                        let valStr = line.substring(lastColonIdx + 1).trim();
                        
                        if (!valStr && i + 1 < lines.length) {
                            let nextLine = lines[i+1].trim();
                            if (!nextLine.includes(':') && nextLine !== '') {
                                valStr = nextLine;
                                i++; 
                            }
                        }

                        labelStr = labelStr.replace(/:\s*/g, ' ').trim();

                        if (labelStr.match(/^n\s+/i)) {
                            labelStr = labelStr.replace(/^n\s+/i, '');
                        }

                        if (labelStr.match(/^Incl\.?\s+/i)) {
                            labelStr = labelStr.replace(/^Incl\.?\s+/i, '') + ' (Incl)';
                        } else if (labelStr.toLowerCase() === 'incl.' || labelStr.toLowerCase() === 'incl' || labelStr.toLowerCase() === 'n') {
                            labelStr = 'Inclusive Tax';
                        }
                        
                        labelStr = labelStr.replace(/\(Incl\.\)/g, '(Incl)');

                        if (labelStr.endsWith('k')) labelStr = labelStr.slice(0, -1) + ' (Charge)';
                        else if (labelStr.endsWith('l')) labelStr = labelStr.slice(0, -1) + ' (Tax)';
                        
                        if (labelStr) {
                            adjustments.push({ label: labelStr + ':', val: formatMoney(valStr) });
                        }
                    }
                    i++; continue;
                }

                let isMeta = false;
                let metaLabel = '';
                let metaVal = '';

                if (line.startsWith('Inv:') || line.startsWith('a:') || line.startsWith('Bill No:')) { 
                    let prefix = line.startsWith('Bill No:') ? 'Bill No:' : (line.startsWith('Inv:') ? 'Inv:' : 'a:');
                    metaLabel = 'Bill No'; metaVal = getValue(prefix); isMeta = true; 
                }
                else if (line.startsWith('Dt:') || line.startsWith('b:') || line.startsWith('Date:')) { 
                    let prefix = line.startsWith('Date:') ? 'Date:' : (line.startsWith('Dt:') ? 'Dt:' : 'b:');
                    metaLabel = 'Date'; metaVal = getValue(prefix); isMeta = true; 
                }
                else if (line.startsWith('Cust:') || line.startsWith('c:') || line.startsWith('Customer:')) { 
                    let prefix = line.startsWith('Customer:') ? 'Customer:' : (line.startsWith('Cust:') ? 'Cust:' : 'c:');
                    metaLabel = 'Customer'; metaVal = getValue(prefix); isMeta = true; 
                }
                else if (line.startsWith('Pay:') || line.startsWith('e:') || line.startsWith('Pay Mode:')) { 
                    let prefix = line.startsWith('Pay Mode:') ? 'Pay Mode:' : (line.startsWith('Pay:') ? 'Pay:' : 'e:');
                    let v = getValue(prefix);
                    metaLabel = 'Pay Mode'; 
                    metaVal = (v === '1') ? 'Cash / Full Payment' : (v === '2') ? 'Online' : (v === '3') ? 'Credit' : v;
                    isMeta = true; 
                }
                else if (line.startsWith('Ph:') || line.startsWith('d:') || line.startsWith('Contact:')) {
                    let prefix = line.startsWith('Contact:') ? 'Contact:' : (line.startsWith('Ph:') ? 'Ph:' : 'd:');
                    if (state === 'header' && line.startsWith('Ph:')) {
                        headers.push('Ph: ' + getValue('Ph:'));
                        i++; continue;
                    } else {
                        metaLabel = 'Contact'; metaVal = getValue(prefix); isMeta = true;
                    }
                }
                else if (line.startsWith('o:')) { 
                    headers.push('Ph: ' + getValue('o:')); 
                    i++; continue; 
                }
                else if (state === 'header' && (line.startsWith('GST:') || line.startsWith('FSSAI:'))) {
                    let prefix = line.startsWith('GST:') ? 'GST:' : 'FSSAI:';
                    let val = getValue(prefix);
                    headers.push(prefix + ' ' + val);
                    i++; continue;
                }

                if (isMeta) {
                    state = 'meta';
                    if (metaLabel) meta.push({ label: metaLabel, val: metaVal });
                    i++; continue;
                }

                if (state === 'header') {
                    headers.push(line);
                } else {
                    state = 'items';
                    flatItems.push(line);
                }
                
                i++; 
            }

            if (flatItems.length >= 3 && 
                flatItems[0].toLowerCase() === 'item' && 
                flatItems[1].toLowerCase() === 'qty' && 
                (flatItems[2].toLowerCase() === 'amt' || flatItems[2].toLowerCase() === 'amount' || flatItems[2].toLowerCase() === 'price')) {
                flatItems.splice(0, 3);
            }

            for (let j = 0; j < flatItems.length; j += 3) {
                let name = flatItems[j] || '';
                let qty = flatItems[j+1] || '';
                let price = flatItems[j+2] || '';
                items.push({ name, qty, price: formatMoney(price) });
            }

            let html = '';

            if (headers.length > 0) {
                html += `<div class="title-text">${headers[0]}</div>`;
                for (let k = 1; k < headers.length; k++) {
                    html += `<div class="text-center header-info">${headers[k]}</div>`;
                }
                html += `<div class="divider"></div>`;
            }

            meta.forEach(m => {
                html += `<div class="header-info">${m.label}: ${m.val}</div>`;
            });
            
            if (meta.length > 0) html += `<div class="divider"></div>`;

            html += `
            <table>
                <thead>
                    <tr>
                        <th class="col-item">Item</th>
                        <th class="col-qty">Qty</th>
                        <th class="col-price">Amt</th>
                    </tr>
                </thead>
                <tbody>
            `;
            items.forEach(itm => {
                html += `
                    <tr>
                        <td class="col-item">${itm.name}</td>
                        <td class="col-qty">${itm.qty}</td>
                        <td class="col-price">${itm.price}</td>
                    </tr>
                `;
            });
            html += `
                </tbody>
            </table>
            <div class="divider"></div>
            <table class="summary-table">
                <tr>
                    <td>Subtotal:</td>
                    <td>${summary.subtotal}</td>
                </tr>
            `;
            
            adjustments.forEach(a => {
                html += `
                <tr>
                    <td>${a.label}</td>
                    <td>${a.val}</td>
                </tr>
                `;
            });

            html += `
                <tr>
                    <td class="font-bold">Grand Total:</td>
                    <td class="font-bold">${summary.grandTotal}</td>
                </tr>
            `;

            if (summary.advance) {
                html += `
                <tr>
                    <td>Advance Paid:</td>
                    <td>${summary.advance}</td>
                </tr>
                `;
            }
            if (summary.balance) {
                html += `
                <tr>
                    <td class="font-bold">Balance Due:</td>
                    <td class="font-bold">${summary.balance}</td>
                </tr>
                `;
            }
            if (summary.dueDate) {
                html += `
                <tr>
                    <td>Due Date:</td>
                    <td>${summary.dueDate}</td>
                </tr>
                `;
            }

            html += `
            </table>
            <div class="divider"></div>
            <div class="text-center mt-2 font-bold">Thank you for your visit!</div>
            <div style="margin-top: 8px;">&nbsp;</div>
            `;

            container.innerHTML = `<div class="receipt-paper">${html}</div>`;
        }
    </script>
</body>
</html>
