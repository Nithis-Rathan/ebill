<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Receipt</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Pako library for fast browser-based decompression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Courier New', Courier, monospace;
        }

        .receipt-container {
            position: relative;
            background: #fff;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            /* Zig-zag jagged edge effect at the top and bottom to simulate a physical receipt */
            background-image: 
                radial-gradient(circle at 10px 0, transparent 10px, #fff 11px),
                radial-gradient(circle at 10px 100%, transparent 10px, #fff 11px);
            background-size: 20px 20px;
            background-repeat: repeat-x;
            background-position: top center, bottom center;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
        }

        /* Hide buttons during physical or PDF printing */
        @media print {
            body {
                background-color: #fff;
            }
            .hide-on-print {
                display: none !important;
            }
            .receipt-container {
                box-shadow: none;
                border: none;
                background-image: none;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        
        <div class="receipt-container mt-4 mb-8 rounded">
            <!-- Receipt Header -->
            <div class="border-b-2 border-dashed border-gray-400 pb-4 mb-4 text-center">
                <h1 class="text-2xl font-bold uppercase tracking-widest text-gray-800">E-Bill</h1>
                <p class="text-gray-500 text-sm mt-1">Digital Copy</p>
            </div>

            <!-- Receipt Content (dynamically populated) -->
            <pre id="receipt-content" class="whitespace-pre-wrap text-sm leading-relaxed text-gray-800">Loading receipt data...</pre>
            
            <!-- Receipt Footer -->
            <div class="border-t-2 border-dashed border-gray-400 pt-4 mt-6 text-center">
                <p class="font-bold text-gray-700">Thank you for your visit!</p>
                <p class="text-xs text-gray-500 mt-2">Have a great day</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center hide-on-print">
            <button onclick="window.print()" class="px-6 py-3 bg-gray-800 text-white font-bold rounded shadow hover:bg-black transition-colors flex-1">
                Print / Save PDF
            </button>
            <a href="javascript:history.back()" class="px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded shadow hover:bg-gray-300 transition-colors text-center flex-1">
                Go Back
            </a>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const cdata = params.get('cdata'); // Compressed Base64 Data
            const data = params.get('data');   // Fallback uncompressed URI encoded data
            
            const receiptContent = document.getElementById('receipt-content');

            try {
                if (cdata) {
                    // 1. Revert URL-safe characters back to standard Base64
                    let base64 = cdata.replace(/-/g, '+').replace(/_/g, '/');
                    
                    // 2. Pad string with "=" to ensure valid base64 length
                    while (base64.length % 4) {
                        base64 += '=';
                    }
                    
                    // 3. Decode base64 to binary string
                    const binaryStr = atob(base64);
                    
                    // 4. Convert binary string to byte array
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    
                    // 5. Decompress the byte array back to the original text using Pako
                    const decompressedText = pako.inflateRaw(bytes, { to: 'string' });
                    receiptContent.textContent = decompressedText;
                } 
                else if (data) {
                    // Fallback logic exactly matching your uncompressed example URL
                    receiptContent.textContent = decodeURIComponent(data);
                } 
                else {
                    receiptContent.textContent = "\n\nError: No receipt data found in the URL.\n\nPlease scan a valid E-Bill QR Code.";
                    receiptContent.classList.add("text-red-500", "text-center");
                }
            } catch (error) {
                console.error("Decoding error:", error);
                receiptContent.textContent = "\n\nError: Unable to decode the receipt data.\n\nThe link might be broken or incomplete.";
                receiptContent.classList.add("text-red-500", "text-center");
            }
        });
    </script>
</body>
</html>
